<!doctype html>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

    />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: rgb(0, 0, 33);
        color: white;
        font-family: "Poppins", sans-serif;
      }
      nav {
        display: flex;
        justify-content: space-around;

        height: 80px;

      nav ul {

      nav ul li {

      nav ul li a {

      }

      nav ul li a:hover {

      }

      main hr{
        border:0;
        background:#9c97f1;
        height: 1.2px;
        margin:60px 84px;
      }

      .left {
        font-size: 1.5rem;
      }

      .firstsection {
        display: flex;
        justify-content: space-around;
        align-items: center;
        margin: 130px 0;
      }
      .firstsection > div {
        width: 30%;
      }
      .leftsection {
        font-size: 2.75rem;
        margin: 70px 0;
      }

      .rightsection img {
        width: 80%;
      }

      .purple {
        color: rgb(153, 78, 222);
      }

      #element {

      }
      .secondsection{

<hr>
      <section class="secondsection">
